<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Scholar Suite — Faculty Directory</title>

  <!-- Google Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400;1,600&family=Lora:ital,wght@0,400;0,500;1,400&family=Barlow:wght@300;400;500;600&family=Barlow+Condensed:wght@400;600;700&display=swap" rel="stylesheet">

  <!-- Stylesheets -->
  <link rel="stylesheet" href="css/tokens.css">
  <link rel="stylesheet" href="css/navbar.css">
  <link rel="stylesheet" href="css/faculty.css">
  <link rel="stylesheet" href="css/projects.css">
</head>
<body>

  <!-- ── NAVBAR ─────────────────────────────────────────────── -->
  <nav class="navbar">
    <div class="nav-brand" id="navBrand">Scholar<span>·Suite</span></div>

    <div class="nav-divider"></div>

    <div class="search-wrap">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
      </svg>
      <input type="text" id="searchInput" placeholder="Search faculty by name, dept…">
    </div>

    <div class="filter-wrap">
      <button class="filter-btn" id="filterBtn">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <polygon points="22 3 2 3 10 12.46 10 19 14 21 14 12.46 22 3"/>
        </svg>
        Filter
      </button>
      <div class="filter-dropdown" id="filterDropdown">
        <label class="filter-option"><input type="checkbox" value="CSE"> Computer Science (CSE)</label>
        <label class="filter-option"><input type="checkbox" value="ECE"> Electronics (ECE)</label>
        <label class="filter-option"><input type="checkbox" value="MECH"> Mechanical (MECH)</label>
        <label class="filter-option"><input type="checkbox" value="CIVIL"> Civil Engineering</label>
        <label class="filter-option"><input type="checkbox" value="MATH"> Mathematics</label>
      </div>
    </div>

    <button class="bookmark-btn" id="bookmarkToggle">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <path d="M19 21l-7-5-7 5V5a2 2 0 0 1 2-2h10a2 2 0 0 1 2 2z"/>
      </svg>
      Saved
    </button>

    <button class="projects-nav-btn" id="allProjectsBtn">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <rect x="2" y="3" width="20" height="14" rx="2"/>
        <line x1="8" y1="21" x2="16" y2="21"/>
        <line x1="12" y1="17" x2="12" y2="21"/>
      </svg>
      All Projects
    </button>

    <div class="student-pill">
      <div class="student-avatar">AM</div>
      <span class="student-name">Arjun M.</span>
    </div>
  </nav>

  <!-- ── MAIN DIRECTORY ─────────────────────────────────────── -->
  <main class="main-content" id="mainContent">
    <div class="page-header">
      <div>
        <h1 class="page-title">Faculty <em>Directory</em></h1>
        <p class="page-subtitle">All registered faculty at the University</p>
      </div>
      <div class="result-count" id="resultCount">Loading…</div>
    </div>

    <div class="active-filters" id="activeFilters"></div>

    <div class="faculty-grid" id="facultyGrid">
      <!-- Populated by js/render.js -->
      <div class="loading-state">
        <div class="loading-spinner"></div>
        <p>Loading faculty…</p>
      </div>
    </div>
  </main>

  <!-- ── PROJECTS FULL PAGE ─────────────────────────────────── -->
  <div class="projects-page" id="projectsPage">
    <div class="projects-topbar">
      <button class="back-btn" id="backBtn">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <line x1="19" y1="12" x2="5" y2="12"/>
          <polyline points="12 19 5 12 12 5"/>
        </svg>
        Back to Directory
      </button>
      <div class="nav-divider"></div>
      <div class="projects-topbar-title" id="projectsTitle">Projects</div>
    </div>
    <div class="projects-body" id="projectsBody">
      <!-- Populated by js/projects.js -->
    </div>
  </div>

  <!-- ── SCRIPTS ────────────────────────────────────────────── -->
  <script src="js/api.js"></script>
  <script src="js/state.js"></script>
  <script src="js/render.js"></script>
  <script src="js/projects.js"></script>
  <script src="js/filters.js"></script>
  <script src="js/main.js"></script>

</body>
</html>
